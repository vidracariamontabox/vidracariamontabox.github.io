<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Montabox — Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet" />
    <style>
      :root {
        --branco: #eaeaea;
        --inox: #acaba9;
        --cinza: #75706f;
        --chumbo: #2c2c2c;
        --preto: #121212;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--preto);
        color: var(--branco);
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
      }

      /* NAVBAR */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 2.5rem;
        padding: 1.5rem 3rem;
        background: transparent;
      }
      .navbar a {
        color: var(--inox);
        text-decoration: none;
        font-size: 0.74rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 500;
        transition: color 0.3s ease;
      }
      .navbar a:hover {
        color: var(--branco);
      }
      .navbar .cta {
        border: 1px solid var(--inox);
        padding: 0.55rem 1.25rem;
        border-radius: 2px;
        color: var(--branco);
        transition:
          background 0.3s ease,
          color 0.3s ease,
          border-color 0.3s ease;
      }
      .navbar .cta:hover {
        background: var(--branco);
        color: var(--preto);
        border-color: var(--branco);
      }

      /* HERO */
      .hero {
        position: relative;
        height: 100vh;
        width: 100%;
        overflow: hidden;
        display: flex;
        align-items: flex-end;
        background: var(--preto);
      }
      .hero::before {
        content: "";
        position: absolute;
        inset: -50%;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(234, 234, 234, 0.035) 45%,
          rgba(234, 234, 234, 0.07) 50%,
          rgba(234, 234, 234, 0.035) 55%,
          transparent 70%
        );
        animation: sweep 9s linear infinite alternate;
      }
      @keyframes sweep {
        0% {
          transform: translate(-8%, -4%);
        }
        100% {
          transform: translate(8%, 4%);
        }
      }
      .hero-mark {
        position: relative;
        z-index: 2;
        padding: 3rem;
      }
      .hero-mark .name {
        font-family: "Archivo", sans-serif;
        font-weight: 300;
        font-size: 0.95rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--branco);
      }
      .hero-mark .tagline {
        margin-top: 0.4rem;
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--cinza);
      }

      /* TESTIMONIALS */
      .testimonials {
        position: relative;
        height: 50vh;
        width: 100%;
        background: var(--preto);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 3.5rem;
      }
      .carousel {
        position: relative;
        width: 100%;
        max-width: 640px;
        height: auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .t-card {
        width: 100%;
        background: var(--chumbo);
        border: 1px solid rgba(117, 112, 111, 0.25);
        border-radius: 3px;
        padding: 1.6rem 1.85rem;
        opacity: 0;
        transform: translateX(24px);
        transition:
          opacity 0.45s ease,
          transform 0.45s ease;
        position: absolute;
      }
      .t-card.active {
        opacity: 1;
        transform: translateX(0);
        position: relative;
      }
      .t-card.exit {
        transform: translateX(-24px);
      }
      .t-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .t-who {
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }
      .t-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--cinza);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Archivo", sans-serif;
        font-size: 0.85rem;
        color: var(--branco);
      }
      .t-name {
        font-size: 0.85rem;
        color: var(--branco);
        line-height: 1.2;
      }
      .t-role {
        font-size: 0.7rem;
        color: var(--cinza);
        margin-top: 0.1rem;
      }
      .t-stars {
        display: flex;
        gap: 2px;
      }
      .t-text {
        margin-top: 1rem;
        font-size: 0.9rem;
        line-height: 1.6;
        color: rgba(234, 234, 234, 0.9);
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .t-audio {
        margin-top: 1rem;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        background: rgba(234, 234, 234, 0.04);
        border-radius: 3px;
        padding: 0.45rem 0.75rem;
        width: fit-content;
      }
      .t-play {
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        color: var(--branco);
        padding: 0;
      }
      .t-wave {
        display: flex;
        align-items: center;
        gap: 2px;
        height: 18px;
      }
      .t-wave span {
        width: 2px;
        border-radius: 1px;
        background: var(--inox);
        height: 4px;
        transition: height 0.2s ease;
      }
      .t-wave.playing span {
        animation: wave 1s ease-in-out infinite;
      }
      .t-wave span:nth-child(odd) {
        animation-delay: 0.1s;
      }
      .t-wave span:nth-child(3n) {
        animation-delay: 0.2s;
      }
      @keyframes wave {
        0%,
        100% {
          height: 4px;
        }
        50% {
          height: 15px;
        }
      }

      .t-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--inox);
        transition: color 0.3s ease;
        padding: 0.5rem;
      }
      .t-arrow:hover {
        color: var(--branco);
      }
      .t-arrow.left {
        left: -0.5rem;
      }
      .t-arrow.right {
        right: -0.5rem;
      }

      .t-dots {
        display: flex;
        gap: 6px;
        margin-top: 1.4rem;
      }
      .t-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(117, 112, 111, 0.5);
        border: none;
        cursor: pointer;
        padding: 0;
      }
      .t-dot.active {
        background: var(--branco);
      }

      @media (max-width: 640px) {
        .navbar {
          padding: 1.2rem 1.5rem;
          gap: 1.2rem;
        }
        .navbar a:not(.cta) {
          display: none;
        }
        .hero-mark {
          padding: 1.75rem;
        }
        .testimonials {
          padding: 0 2.4rem;
          height: 56vh;
        }
        .t-arrow.left {
          left: -0.65rem;
        }
        .t-arrow.right {
          right: -0.65rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="#depoimentos">Depoimentos</a>
      <a href="#faq">FAQ</a>
      <a href="#contato">Contato</a>
      <a href="#contato" class="cta">Solicitar Orçamento</a>
    </nav>

    <section class="hero">
      <div class="hero-mark">
        <p class="name">Montabox</p>
        <p class="tagline">Vidraçaria &amp; Serralheria de Alumínio</p>
      </div>
    </section>

    <section class="testimonials" id="depoimentos">
      <button class="t-arrow left" onclick="prevSlide()" aria-label="Depoimento anterior">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <button class="t-arrow right" onclick="nextSlide()" aria-label="Próximo depoimento">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18l6-6-6-6" />
        </svg>
      </button>

      <div class="carousel" id="carousel"></div>
      <div class="t-dots" id="dots"></div>
    </section>

    <script>
      const testimonials = [
        {
          name: "Anderson Alefante",
          role: "Cliente Montabox",
          text: "Ótima prestação de serviço, material de ótima qualidade, tudo impecável.",
        },
        {
          name: "Renata Rossi",
          role: "Cliente Montabox",
          text: "Ótimo profissional, entregou no prazo e o material é excelente. Está tudo lindo.",
        },
        {name: "Fernanda Calixto", role: "Cliente Montabox", text: "Excelente, trabalho impecável."},
        {name: "Tamires Perez", role: "Cliente Montabox", text: "Ótimo, bem feito o trabalho e ficou lindo!"},
        {
          name: "Pinotti Máquinas",
          role: "Cliente Montabox",
          text: "Empresa excelente, com atendimento de qualidade, equipe atenciosa e comprometida. Sempre cumpre o que promete, com muita agilidade.",
        },
        {name: "Paola Macri", role: "Cliente Montabox", text: "Gostei bastante, serviço rápido e de qualidade."},
        {name: "Vinícius Servidone Trizolio", role: "Cliente Montabox", text: "Ótimo atendimento e melhor preço!"},
        {name: "Maisa Trevisoli", role: "Cliente Montabox", text: "Excelente profissional!"},
        {
          name: "Bruna Tarina",
          role: "Cliente Montabox",
          text: "Atendimento impecável, produto de excelente qualidade e serviço rápido. Me surpreendi com a eficiência da equipe!",
        },
        {
          name: "Cássio Fouad",
          role: "Cliente Montabox",
          text: "Muito satisfeito com o resultado e entrega antes do prazo combinado. Profissionais atenciosos e acabamento nos mínimos detalhes.",
        },
        {name: "Marcos Leonanjo", role: "Cliente Montabox", text: "Ótimos serviços e qualidade de alto padrão!"},
        {name: "Flávio Costa", role: "Cliente Montabox", text: "Bem atendido, sempre pode confiar."},
        {
          name: "Junior Mazza",
          role: "Cliente Montabox",
          text: "Desde o início fui muito bem atendido. A empresa apresentou todos os projetos e medidas das esquadrias com clareza.",
        },
        {
          name: "Gustavo Salomão",
          role: "Cliente Montabox",
          text: "Não conhecia a Montabox, fui por indicação e realmente me surpreenderam em toda a obra.",
        },
        {
          name: "Tata",
          role: "Cliente Montabox",
          text: "Ficou perfeito meu box e meus espelhos. Ótimo trabalho, super recomendo!",
        },
        {name: "Alison Otrante da Silva", role: "Cliente Montabox", text: "Serviço de extrema qualidade!"},
        {
          name: "Julio Sisdelli",
          role: "Cliente Montabox",
          text: "Empresa de alto nível, com entrega excelente e funcionários capacitados.",
        },
        {name: "Henrique Messana", role: "Cliente Montabox", text: "Excelência e qualidade."},
        {name: "Eduardo Bedore", role: "Cliente Montabox", text: "Ótimo profissional, preço justo."},
        {
          name: "Victoria De Bonis",
          role: "Cliente Montabox",
          text: "Gostaria de destacar o serviço do Ronaldo e sua equipe, que realmente superou minhas expectativas.",
        },
      ];

      let index = 0;
      let playingIndex = null;
      let currentAudio = null;
      let autoplayTimer = null;

      function starsSVG() {
        let s = "";
        for (let i = 0; i < 5; i++) {
          s +=
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="#eaeaea"><path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279L12 19.771l-7.416 3.642 1.48-8.279L0 9.306l8.332-1.151z"/></svg>';
        }
        return s;
      }

      function waveBars(playing) {
        let bars = "";
        for (let i = 0; i < 16; i++) {
          bars += "<span></span>";
        }
        return '<div class="t-wave ' + (playing ? "playing" : "") + '">' + bars + "</div>";
      }

      function renderCard(direction) {
        const t = testimonials[index];
        const playing = playingIndex === index;
        const carousel = document.getElementById("carousel");
        carousel.innerHTML = `
      <div class="t-card active">
        <div class="t-top">
          <div class="t-who">
            <div class="t-avatar">${t.name.charAt(0)}</div>
            <div>
              <p class="t-name">${t.name}</p>
              <p class="t-role">${t.role}</p>
            </div>
          </div>
          <div class="t-stars">${starsSVG()}</div>
        </div>
        <p class="t-text">"${t.text}"</p>
        <div class="t-audio">
          <button class="t-play" onclick="toggleAudio()" aria-label="Reproduzir depoimento em áudio">
            ${
              playing
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M9 8h2v8H9zm4 0h2v8h-2z"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 6.82v10.36a1 1 0 0 0 1.5.87l9-5.18a1 1 0 0 0 0-1.74l-9-5.18A1 1 0 0 0 8 6.82z"/></svg>'
            }
          </button>
          ${waveBars(playing)}
        </div>
      </div>
    `;
        renderDots();
      }

      function renderDots() {
        const dots = document.getElementById("dots");
        dots.innerHTML = testimonials
          .map(
            (_, i) =>
              `<button class="t-dot ${i === index ? "active" : ""}" onclick="goTo(${i})" aria-label="Ir para depoimento ${i + 1}"></button>`,
          )
          .join("");
      }

      function toggleAudio() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        if (playingIndex === index) {
          playingIndex = null;
        } else {
          // Arquivo de áudio real ainda não existe — troque o src quando os áudios forem gravados
          const audio = new Audio(`/audio/testimonial-${index}.mp3`);
          audio.addEventListener("ended", () => {
            playingIndex = null;
            renderCard();
          });
          audio.play().catch(() => {});
          currentAudio = audio;
          playingIndex = index;
        }
        renderCard();
      }

      function nextSlide() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        playingIndex = null;
        index = (index + 1) % testimonials.length;
        renderCard();
        resetAutoplay();
      }

      function prevSlide() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        playingIndex = null;
        index = (index - 1 + testimonials.length) % testimonials.length;
        renderCard();
        resetAutoplay();
      }

      function goTo(i) {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        playingIndex = null;
        index = i;
        renderCard();
        resetAutoplay();
      }

      function resetAutoplay() {
        clearInterval(autoplayTimer);
        autoplayTimer = setInterval(nextSlide, 6500);
      }

      renderCard();
      resetAutoplay();

      const testimonialsSection = document.querySelector(".testimonials");
      testimonialsSection.addEventListener("mouseenter", () => clearInterval(autoplayTimer));
      testimonialsSection.addEventListener("mouseleave", resetAutoplay);
    </script>
  </body>
</html>
